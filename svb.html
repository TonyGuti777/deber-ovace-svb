<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA 01: Soporte Vital Básico | ITECSUR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pastel-glow-rose { text-shadow: 0 0 10px #fb7185; }
        .monitor-scan::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body class="bg-stone-950 text-stone-300 font-sans p-6 md:p-12">

    <nav class="max-w-7xl mx-auto mb-12 border-b border-stone-800 pb-6 flex justify-between items-center">
        <a href="index.html" class="text-rose-400 font-bold hover:text-white transition">← VESTÍBULO</a>
        <span class="text-stone-600 text-xs font-mono tracking-widest">SISTEMA CLÍNICO ITECSUR v2.0</span>
    </nav>

    <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-8 pb-32">
        
        <!-- IZQUIERDA: RELOJ Y CALIBRADOR -->
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-stone-950/80 border border-rose-950/20 p-6 rounded-3xl shadow-xl relative overflow-hidden monitor-scan">
                <h3 class="text-xs font-mono text-stone-400 font-bold uppercase mb-4">⏱️ Reloj Clínico de Anoxia Cerebral</h3>
                <div class="bg-stone-900/60 p-4 rounded-2xl border border-stone-800 text-center mb-4">
                    <div class="text-3xl font-mono text-rose-400 font-bold tracking-wider pastel-glow-rose" id="reloj-isquemia">00:00.00</div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="controlarReloj('iniciar')" class="bg-rose-400 text-stone-950 font-bold py-3 rounded-xl hover:bg-rose-300 transition">Iniciar Paro</button>
                    <button onclick="controlarReloj('reiniciar')" class="bg-stone-900 text-stone-400 border border-stone-800 font-bold py-3 rounded-xl hover:text-white transition">Reset</button>
                </div>
            </div>
        </div>

        <!-- DERECHA: INFO Y CONTROLADOR -->
        <div class="lg:col-span-8 space-y-8">
            <img src="https://eboraformacion.es/wp-content/uploads/2023/07/CURSO-RCP-ONLINE.webp" class="rounded-3xl border border-stone-800 w-full shadow-2xl">
            
            <!-- CONTROLADOR DE RITMO -->
            <section class="bg-stone-950/40 border border-stone-800 p-8 rounded-3xl space-y-6">
                <div class="flex items-center gap-3 border-b border-stone-800 pb-4">
                    <div class="w-1 h-5 bg-emerald-400 rounded-full"></div>
                    <h2 class="text-lg font-bold text-stone-100">3.0 Sincronización del Ritmo de Compresión</h2>
                </div>
                <div class="bg-stone-900/50 border border-stone-800 p-6 rounded-2xl">
                    <div class="flex items-center justify-between gap-4">
                        <div>
                            <h4 class="text-stone-200 font-bold font-mono text-xs uppercase">🔊 Controlador de Ritmo</h4>
                            <p class="text-[10px] text-stone-400 mt-1">Haz clic para marcar el pulso (100-120 cpm).</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div id="led-ritmo" class="w-3 h-3 rounded-full bg-stone-950 border border-emerald-500"></div>
                            <button onclick="contar()" class="font-mono text-xs text-emerald-400 bg-stone-950 border border-emerald-900 px-4 py-2 rounded hover:bg-emerald-950 transition" id="btn-conteo">CONTEO: 0</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        let tiempo = 0, intervalo, conteo = 0;
        function controlarReloj(accion) {
            if (accion === 'iniciar') {
                if(intervalo) return;
                intervalo = setInterval(() => {
                    tiempo += 10;
                    document.getElementById('reloj-isquemia').innerText = new Date(tiempo).toISOString().substr(14, 8);
                }, 10);
            } else { tiempo = 0; clearInterval(intervalo); intervalo = null; document.getElementById('reloj-isquemia').innerText = "00:00.00"; }
        }
        function contar() {
            conteo++;
            document.getElementById('btn-conteo').innerText = "CONTEO: " + conteo;
            const led = document.getElementById('led-ritmo');
            led.style.backgroundColor = '#34d399';
            setTimeout(() => led.style.backgroundColor = '#0c0a09', 200);
        }
    </script>
</body>
</html>
